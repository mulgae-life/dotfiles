# ─────────────────────────────────────────────
# Gemini CLI 전역 안전 정책
# Claude Code의 auto-approve-readonly.sh + permissions에 대응 — 카테고리별 사유 분기로 통일
# denyMessage는 차단/승인요청 시점에 사용자/에이전트에게 노출됨 → 대체 방법까지 안내
# (TOML은 변수 미지원이라 메시지를 카테고리별로 인라인 반복)
#
# ── commandRegex 작성 규칙 (Gemini CLI 0.38.1 소스 실측, 2026-07-10) ──
# 엔진은 최종 패턴을 `"command":"<commandRegex>` 로 조립해 stableStringify(args)에 test한다.
#   1. 선두 `^` 금지 — 접두 리터럴 뒤 `^`는 영구 미매치 (34개 중 33개 사문화됐던 원인)
#   2. 명령 끝 앵커는 `$` 대신 `"` (JSON 값의 닫는 따옴표) — 값 내부 따옴표는 \"로
#      이스케이프되어 두 글자이므로 오매치 없음
#   3. `.*`/`\S+` 대신 `[^"]*` — 값 경계를 넘어 description 등 다른 필드로 새는 매칭 방지
#   4. 수량자를 품은 그룹에 수량자 금지: `(X+)*`류는 isSafeRegExp의 ReDoS 가드
#      /\([^)]*[*+?{].*\)[*+?{]/ 가 규칙째 무효 처리 — `(\S+\s+)*` 관용구 사용 불가.
#      토큰 앵커가 필요하면 `(direct|[^"]* token)` 알터네이션으로 대체
#   5. 복합 명령은 파트별 재귀 판정 후 집계(하나라도 ask면 ask) — 파트가 전부 allow면
#      전체 매칭 ask보다 우선되므로, 위험 조합은 "파트 단독으로 allow되지 않게" 설계
#   6. 리다이렉트(>)가 있으면 allow가 ask로 강등됨(allowRedirection 미설정 시) — 보수적 유지
# 검증: scripts/verify-policies.sh 가 엔진 로직 복제(scripts/gemini-policy-engine.mjs)로 회귀 테스트
# ─────────────────────────────────────────────

# ── 위험 명령 사용자 승인 요청 (ask_user) ────
# 사용자 명시 요청 시 승인하여 실행, 자율 작업 중에는 시스템 프롬프트(GEMINI.md)가 회피
# 안전 명령에서는 절대 ask_user 발동 안 함 → 자율 작업 흐름 중단 없음

# 파일 삭제 (FILE_DELETE)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(rm|rmdir|unlink|shred|truncate)\\b"
decision = "ask_user"
priority = 900
allowRedirection = false
denyMessage = "파일 삭제는 비가역적입니다. 보존이 목적이면 .archive/<YYYY-MM-DD>_<태그>/로 mv를 검토하세요. 사용자가 명시적으로 삭제를 요청한 경우에만 승인하세요."

# /tmp 예외 (Claude hook 경로 기반 정책과 정합): 대상이 전부 /tmp/ 하위인 단순 삭제는 자동 허용
# 조건: 삭제 명령 + 이후 토큰은 플래그(-*) 또는 /tmp/ 절대경로만 + /tmp/ 대상 최소 1개.
# lookahead 3종이 ..(경로탈출)·비플래그 상대 토큰·비-/tmp 절대경로를 배제하고,
# 본문 문자 화이트리스트가 메타문자(; | & $ ` < > 따옴표 백슬래시)를 배제한다.
# 중첩 수량자 없는 구조(작성 규칙 4) — 이전 `(\s+/tmp(...)+)+` 형태는 ReDoS 가드에 걸려 무효였음.
# truncate는 -s <크기> 값 인자라 미커버(ask 유지). cd /tmp && 상대경로 형태도 미커버(Claude 전용).
[[rule]]
toolName = "run_shell_command"
commandRegex = '(rm|rmdir|unlink) (?=-|/tmp/)(?![^"]*\.\.)(?![^"]* [^-/ ])(?![^"]* /(?!tmp/))(?=[^"]*/tmp/[A-Za-z0-9._-])[A-Za-z0-9._/ -]*"'
decision = "allow"
priority = 950
allowRedirection = false

# Git 쓰기 (push, commit, reset 등) — GIT_WRITE
# [^"]*\b 로 글로벌 옵션(-c, --no-pager, -C path 등) 우회 방지
[[rule]]
toolName = "run_shell_command"
commandRegex = 'git\s[^"]*\b(push|commit|reset|clean|rebase|merge|cherry-pick|revert|am|apply)\b'
decision = "ask_user"
priority = 900
denyMessage = "Git 쓰기(push/commit/reset/rebase/merge 등)입니다. 이력·리모트가 바뀝니다. 사용자 명시 승인 후에만 진행하세요."

# Git 파괴 (branch 삭제, tag 삭제/강제) — GIT_WRITE
[[rule]]
toolName = "run_shell_command"
commandRegex = 'git\s[^"]*\b(branch\s+-[dD]|tag\s+(-[df]|--delete))\b'
decision = "ask_user"
priority = 910
denyMessage = "Git 쓰기(push/commit/reset/rebase/merge 등)입니다. 이력·리모트가 바뀝니다. 사용자 명시 승인 후에만 진행하세요."

# Git 상태 변경 (checkout/switch/restore) — GIT_STATE
# 브랜치 전환 시 작업 컨텍스트 손실, detached HEAD, working tree 변경 폐기 위험
[[rule]]
toolName = "run_shell_command"
commandRegex = 'git\s[^"]*\b(checkout|switch|restore)\b'
decision = "ask_user"
priority = 920
denyMessage = "Git 상태 변경(checkout/switch/restore/stash/add)입니다. working tree·staging이 바뀝니다. 현재 작업 컨텍스트를 사용자와 먼저 확인하세요."

# Git stash — GIT_STATE (Claude hook과 정합: list/show 조회는 allow, 상태 변경만 ask)
# 매칭 3분기: ①상태변경 서브커맨드 ②옵션 직결(-u 등 = push 변형) ③단독 stash(=push)
[[rule]]
toolName = "run_shell_command"
commandRegex = 'git\s[^"]*\bstash(\s+(push|save|pop|apply|drop|clear|branch|create|store)\b|\s+-|\s*")'
decision = "ask_user"
priority = 920
denyMessage = "Git 상태 변경(checkout/switch/restore/stash/add)입니다. working tree·staging이 바뀝니다. 현재 작업 컨텍스트를 사용자와 먼저 확인하세요."

# Git stash 조회 (list/show) — 읽기 전용이라 allow (기본 판정이 ask라 명시 필요)
[[rule]]
toolName = "run_shell_command"
commandRegex = 'git\s[^"]*\bstash\s+(list|show)\b'
decision = "allow"
priority = 500

# Git staging (git add) — GIT_STATE
# work-principles.md 정합: git add도 "Git 상태 변경" 카테고리.
# 토큰 앵커 알터네이션(작성 규칙 4) — `--add-*` 류 플래그 오탐 방지
[[rule]]
toolName = "run_shell_command"
commandRegex = 'git (add|[^"]* add)\b'
decision = "ask_user"
priority = 900
denyMessage = "Git 상태 변경(checkout/switch/restore/stash/add)입니다. working tree·staging이 바뀝니다. 현재 작업 컨텍스트를 사용자와 먼저 확인하세요."

# GitHub CLI 쓰기 — GH_CLI
[[rule]]
toolName = "run_shell_command"
commandRegex = "gh\\s+(pr|issue|release)\\s+(create|close|delete|merge|edit|comment)\\b"
decision = "ask_user"
priority = 900
denyMessage = "GitHub CLI 쓰기 작업입니다. 외부 시스템(PR/이슈/릴리즈)에 영향이 있으므로 사용자 명시 승인 후 진행하세요."

# api 쓰기 플래그: 공백+토큰 시작 매칭으로 결합형(-XDELETE)·위치무관·롱폼(--method 등) 커버
[[rule]]
toolName = "run_shell_command"
commandRegex = 'gh\s+api\b[^"]* (-X|-[fF]|--method\b|--field\b|--raw-field\b|--input\b)'
decision = "ask_user"
priority = 900
denyMessage = "GitHub CLI 쓰기 작업입니다. 외부 시스템(PR/이슈/릴리즈)에 영향이 있으므로 사용자 명시 승인 후 진행하세요."

# GitHub CLI 인증 변경 — GH_CLI
[[rule]]
toolName = "run_shell_command"
commandRegex = "gh\\s+auth\\s+(login|logout)\\b"
decision = "ask_user"
priority = 900
denyMessage = "GitHub CLI 쓰기 작업입니다. 외부 시스템(PR/이슈/릴리즈)에 영향이 있으므로 사용자 명시 승인 후 진행하세요."

# 시스템 명령 — SYSTEM
[[rule]]
toolName = "run_shell_command"
commandRegex = "(reboot|shutdown|poweroff|halt|dd|mkfs|fdisk|parted)\\b"
decision = "ask_user"
priority = 999
denyMessage = "시스템 레벨 명령(sudo/reboot/dd/mkfs 등)입니다. 환경 전체에 영향을 주므로 사용자 명시 승인이 필수입니다."

# sudo — SYSTEM
[[rule]]
toolName = "run_shell_command"
commandPrefix = "sudo"
decision = "ask_user"
priority = 999
denyMessage = "시스템 레벨 명령(sudo/reboot/dd/mkfs 등)입니다. 환경 전체에 영향을 주므로 사용자 명시 승인이 필수입니다. (특히 sudo는 비밀번호 프롬프트로 작업이 중단됨)"

# Docker 삭제 — DOCKER_DELETE
[[rule]]
toolName = "run_shell_command"
commandRegex = "docker\\s+(rm|rmi)\\b"
decision = "ask_user"
priority = 900
denyMessage = "Docker 리소스 삭제(rm/rmi/down)입니다. 컨테이너·이미지·볼륨 손실 가능. 사용자 확인 후 진행하세요."

[[rule]]
toolName = "run_shell_command"
commandRegex = "docker[- ]compose\\s+(down|rm)\\b"
decision = "ask_user"
priority = 900
denyMessage = "Docker 리소스 삭제(rm/rmi/down)입니다. 컨테이너·이미지·볼륨 손실 가능. 사용자 확인 후 진행하세요."

# ── A 그룹: 명확히 위험한 상태 변경 명령 ────────
# 영향도가 적은 read-only 명령만 자동 허용 원칙

# 파일 in-place 수정 (Edit 도구 우회) — INPLACE
# 토큰 앵커 알터네이션(작성 규칙 4) — 이전 `(\S+\s+)*` 형태는 ReDoS 가드에 걸려 무효였음
[[rule]]
toolName = "run_shell_command"
commandRegex = '(sed (-i|--in-place|[^"]* -i|[^"]* --in-place)\b|g?awk (-i inplace|[^"]* -i inplace)\b)'
decision = "ask_user"
priority = 900
denyMessage = "파일 in-place 수정(sed -i/awk -i inplace)은 차단됩니다. 파일 수정은 replace/write_file 등 전용 편집 도구를 사용하세요. Bash 우회는 변경 추적이 어렵습니다."

# 링크 강제 덮어쓰기 — LINK_FORCE
# cp/mv는 경로 변경·복사로 되돌리기 쉬워 allow (덮어쓰기 케이스는 의도적)
[[rule]]
toolName = "run_shell_command"
commandRegex = 'ln (-[a-zA-Z]*f|[^"]* -[a-zA-Z]*f)'
decision = "ask_user"
priority = 900
denyMessage = "링크 강제 덮어쓰기(ln -sf 등)입니다. 기존 링크/파일이 덮어쓰일 수 있습니다. 사용자 명시 승인 후 진행하세요."

# 권한/소유자 변경 — PERMISSION
[[rule]]
toolName = "run_shell_command"
commandRegex = "(chmod|chown)\\b"
decision = "ask_user"
priority = 900
denyMessage = "권한/소유자 변경(chmod/chown)입니다. 보안 상태가 바뀝니다. 사용자가 명시 요청한 경우에만 진행하세요."

# 셸 우회 (echo "..." | bash, bash <(...)) — SHELL_BYPASS
# 위치 무관 매칭이 필요해 [^"]* 접두(작성 규칙 1·3).
# 주의: 복합 명령 파트 집계(작성 규칙 5) 때문에 이 규칙만으로는 부족 — 파이프로 갈라진
# bare `bash`/`sh` 파트가 allow되지 않도록 아래 런타임 allow 규칙이 "인자 필수"로 설계됨.
# `| bash -i` 같은 인자 동반 변형은 파트 집계상 통과 가능 → GEMINI.md 지침이 1차 통제
[[rule]]
toolName = "run_shell_command"
commandRegex = '[^"]*(\|\s*(bash|sh)\b|\b(bash|sh)\s+<\()'
decision = "ask_user"
priority = 900
denyMessage = "셸 우회 패턴(echo|bash, bash <(...), find -delete 등)은 차단됩니다. 우회 자체가 금지되며, 원본 명령을 직접 호출하면 정상적으로 정책이 작동합니다."

# find -delete (rm 대체) — SHELL_BYPASS
[[rule]]
toolName = "run_shell_command"
commandRegex = 'find\b[^"]*\s-delete\b'
decision = "ask_user"
priority = 900
denyMessage = "셸 우회 패턴(echo|bash, bash <(...), find -delete 등)은 차단됩니다. 우회 자체가 금지되며, 원본 명령을 직접 호출하면 정상적으로 정책이 작동합니다."

# 인라인 스크립트 우회(python -c "os.system(...)", node -e "fs.rmSync(...)", bash -c "rm ...")는
# 정밀 매칭이 복잡하고 자율성을 저해할 위험이 있어 hook에서 차단하지 않음 — GEMINI.md 지침으로 통제

# ── 안전한 읽기 명령 자동 승인 ───────────────

# Git 읽기
[[rule]]
toolName = "run_shell_command"
commandRegex = "git\\s+(status|diff|log|show|blame|fetch|branch|tag|remote|rev-parse|ls-files|shortlog|describe|config\\s+--get)\\b"
decision = "allow"
priority = 500

# 파일 시스템 읽기
[[rule]]
toolName = "run_shell_command"
commandRegex = "(ls|pwd|cat|head|tail|wc|file|stat|readlink|realpath|tree|basename|dirname|find|du|df)\\b"
decision = "allow"
priority = 500

# 시스템 정보
[[rule]]
toolName = "run_shell_command"
commandRegex = "(ps|free|uname|hostname|uptime|whoami|id|date|nproc|lscpu|lsblk|mount|env|printenv|which|locale|getent|groups)\\b"
decision = "allow"
priority = 500

# 네트워크 진단
[[rule]]
toolName = "run_shell_command"
commandRegex = "(ping|dig|nslookup|ss|netstat|lsof|curl|wget)\\b"
decision = "allow"
priority = 500

# 텍스트 처리
[[rule]]
toolName = "run_shell_command"
commandRegex = "(grep|rg|sed|awk|tr|sort|uniq|cut|diff|jq|yq|xargs|printf|echo|tee)\\b"
decision = "allow"
priority = 500

# 파일 관리 (비파괴) — 단순 생성 + 경로 변경·복사
# ln -f/-sf/chmod/chown은 위 ask_user 규칙(priority 900)이 우선 적용됨
[[rule]]
toolName = "run_shell_command"
commandRegex = "(mkdir|touch|cp|mv)\\b"
decision = "allow"
priority = 400

# 아카이브
[[rule]]
toolName = "run_shell_command"
commandRegex = "(tar|zip|unzip|gzip|gunzip)\\b"
decision = "allow"
priority = 400

# 빌드/테스트/패키지 매니저
[[rule]]
toolName = "run_shell_command"
commandRegex = "(npm|npx|pnpm|yarn|pip|pip3|uv|cargo|go|make|cmake|tsc|eslint|prettier|pytest|jest|vitest)\\b"
decision = "allow"
priority = 500

# 런타임 — 인자 필수 (`bash <인자>`만 allow)
# bare 인터프리터(`bash` 단독)를 allow하면 `echo ... | bash`의 파이프 파트가 파트 집계로
# 통과(작성 규칙 5)하므로 인자를 요구한다. bare 파트는 기본 판정(ask)으로 떨어짐.
# REPL 단독 실행은 에이전트 맥락에서 무의미(행 걸림)라 ask여도 손실 없음
[[rule]]
toolName = "run_shell_command"
commandRegex = '(node|python|python3|ruby|bash|sh)\b [^"]'
decision = "allow"
priority = 400

# 프로세스 관리: kill/pkill/killall은 allow (재시작 가능한 조작 — 파일 삭제·git 쓰기와 위험 등급 다름)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(kill|pkill|killall)\\b"
decision = "allow"
priority = 400

# 환경 관리
[[rule]]
toolName = "run_shell_command"
commandRegex = "(source|export|nvm|pyenv)\\b"
decision = "allow"
priority = 400

# GitHub CLI 읽기
[[rule]]
toolName = "run_shell_command"
commandRegex = "gh\\s+(pr|issue|release|repo)\\s+(list|view|status|checks|diff)\\b"
decision = "allow"
priority = 500

# gh api 읽기 (쓰기 플래그는 위 ask_user 규칙 900이 우선)
# commandPrefix는 접두 뒤 공백/따옴표 경계를 엔진이 추가 요구 → 후미 공백 넣으면 미매치 (실측)
[[rule]]
toolName = "run_shell_command"
commandPrefix = "gh api"
decision = "allow"
priority = 400

# Docker 읽기
[[rule]]
toolName = "run_shell_command"
commandRegex = "docker\\s+(ps|images|logs|inspect|info|version|stats|network\\s+ls|volume\\s+ls)\\b"
decision = "allow"
priority = 500

[[rule]]
toolName = "run_shell_command"
commandRegex = "docker[- ]compose\\s+(ps|logs)\\b"
decision = "allow"
priority = 500

# 패키지 정보 조회
[[rule]]
toolName = "run_shell_command"
commandRegex = "(npm\\s+(list|info|--version)|pip3?\\s+(list|show|--version)|dpkg\\s+-l|apt\\s+list)\\b"
decision = "allow"
priority = 500

# systemd/로그 읽기
[[rule]]
toolName = "run_shell_command"
commandRegex = "(systemctl\\s+status|journalctl|dmesg|crontab\\s+-l)\\b"
decision = "allow"
priority = 500

# 해시/체크섬
[[rule]]
toolName = "run_shell_command"
commandRegex = "(sha256sum|md5sum)\\b"
decision = "allow"
priority = 500

# Git 스테이징: git add는 위 A 그룹 ask_user 규칙(priority 900)이 우선 적용됨
# checkout/switch/restore·stash 상태변경은 위 ask_user 규칙(priority 920)이 우선,
# stash list/show 조회는 allow 규칙(priority 500)으로 분리 (Claude hook 정합)

# ── 기타 도구 자동 승인 ──────────────────────

# 파일 읽기/검색 도구
[[rule]]
toolName = ["read_file", "glob", "grep_search"]
decision = "allow"
priority = 500
